<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Site Maintenance</title>
  <style>
    :root{--bg:#0f1724;--card:#0b1220;--accent:#67d4ff;--muted:#9aa4af;color-scheme:dark}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial}
    body{display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#071028 0%, #07172a 100%);color:#e6eef8}
    .card{max-width:760px;padding:40px;border-radius:12px;background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));box-shadow:0 10px 40px rgba(2,6,23,0.6);text-align:center}
    h1{margin:0 0 12px;font-size:28px}
    p{color:var(--muted);margin:0 0 20px}
    .cta{display:inline-block;padding:10px 18px;border-radius:8px;background:var(--accent);color:#071422;text-decoration:none;font-weight:600}
    .meta{margin-top:18px;font-size:13px;color:#7f8a95}
  </style>
</head>
<body>
  <div class="card" role="main" aria-labelledby="mtitle">
    <h1 id="mtitle">We'll be back soon</h1>
    <p>We're doing some maintenance to make the site better. Thanks for your patience — we'll be back shortly.</p>
    <a class="cta" href="mailto:namannaitik34@gmail.com">Contact</a>
    <div class="meta">If you need immediate help, email <a href="mailto:namannaitik34@gmail.com">namannaitik34@gmail.com</a></div>
  </div>
</body>
</html>
