<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Launching Soon</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- EmailJS for client-side email sending -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Mobile Menu Toggle -->
        <div class="menu-toggle" id="menuToggle">
            <i class="fas fa-bars"></i>
        </div>

        <!-- Navigation Menu -->
        <nav class="nav-menu" id="navMenu">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#portfolio">Portfolio</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <h1 class="main-title">Launching Soon</h1>
            
            <!-- Countdown Timer -->
            <div class="countdown-container">
                <div class="countdown-group">
                    <div class="countdown-box">
                        <span id="days">20</span>
                    </div>
                    <label>DAYS</label>
                </div>
                
                <div class="countdown-group">
                    <div class="countdown-box">
                        <span id="hours">22</span>
                    </div>
                    <label>HOURS</label>
                </div>
                
                <div class="countdown-group">
                    <div class="countdown-box">
                        <span id="minutes">50</span>
                    </div>
                    <label>MINUTES</label>
                </div>
                
                <div class="countdown-group">
                    <div class="countdown-box">
                        <span id="seconds">30</span>
                    </div>
                    <label>SECONDS</label>
                </div>
            </div>

            <!-- Description -->
            <p class="description">We'll let you know when we are Launching</p>

            <!-- Email Subscription Form -->
            <div class="subscription-form">
                <form id="subscriptionForm">
                    <input type="email" id="emailInput" placeholder="Email Address" required>
                    <button type="submit" class="notify-btn">Notify Me</button>
                </form>
                <div class="form-message" id="formMessage"></div>
            </div>
        </div>

        <!-- Social Media Icons -->
        <div class="social-icons">
            <a href="https://www.linkedin.com/in/namannaitik34/" class="social-icon" aria-label="LinkedIn">
                <i class="fab fa-linkedin-in"></i>
            </a>
            <a href="https://www.instagram.com/naman_naitik34/" class="social-icon" aria-label="Instagram">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="https://peerlist.io/naman_naitik34" class="social-icon" aria-label="peerlist">
                <i class="fab fa-solid fa-p"></i>
            </a>
        </div>

        <!-- Background Decorative Elements -->
        <div class="bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
